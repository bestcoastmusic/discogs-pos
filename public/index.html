<!DOCTYPE html>
<html>
<head>
  <title>Vinyl POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f1115;
      color: white;
      padding: 20px;
    }

    input, textarea, button, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #00e676;
      font-weight: bold;
    }

    .card {
      background: #1a1d23;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<h2>Vinyl POS</h2>

<input id="barcode" placeholder="Scan barcode"/>

<button id="scanBtn">Scan</button>
<button id="cameraBtn">Camera Scan</button>

<video id="camera" style="display:none;width:100%;max-width:300px;"></video>

<textarea id="bulk"></textarea>
<button id="bulkBtn">Bulk</button>

<div id="results"></div>
<div id="history"></div>

<script src="app.js"></script>

</body>
</html>
